<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Todo Card</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Work+Sans:ital,wght@0,300;0,400;0,500;1,300;1,400&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <main class="page">
      <article
        data-testid="test-todo-card"
        class="todo-card"
        aria-label="Task: Design system audit"
      >
        <header class="card-header">
          <div class="header-top">
            <span
              data-testid="test-todo-priority"
              id="todo-priority-badge"
              class="badge badge-high"
              aria-label="Priority: High"
            >
              <span class="dot" aria-hidden="true"></span>
              <span id="todo-priority-text">High</span>
            </span>
            <span
              data-testid="test-todo-status"
              id="todo-status-badge"
              class="badge badge-inprogress"
              aria-label="Status: In Progress"
            >
              <span class="dot" aria-hidden="true"></span>
              <span id="todo-status-text">In Progress</span>
            </span>
          </div>

          <div class="title-row">
            <label class="checkbox-label" for="todo-complete">
              <input
                type="checkbox"
                id="todo-complete"
                data-testid="test-todo-complete-toggle"
                aria-label="Mark task as complete"
              />
              <span class="custom-check" aria-hidden="true">
                <svg
                  viewBox="0 0 12 10"
                  fill="none"
                  xmlns="http://www.w3.org/2000/svg"
                >
                  <path
                    d="M1 5l3.5 3.5L11 1"
                    stroke="currentColor"
                    stroke-width="1.8"
                    stroke-linecap="round"
                    stroke-linejoin="round"
                  />
                </svg>
              </span>
            </label>
            <h2
              data-testid="test-todo-title"
              id="todo-title"
              class="todo-title"
            >
              Build a to-do card
            </h2>
          </div>
        </header>

        <p
          data-testid="test-todo-description"
          id="todo-description"
          class="todo-description"
        >
          Implement a fully accessible, testable to-do card component.
        </p>

        <hr class="divider" aria-hidden="true" />

        <div class="dates-section">
          <div class="date-item">
            <span class="date-label">Due date</span>
            <time
              data-testid="test-todo-due-date"
              id="todo-due-date"
              datetime="2026-05-01T18:00:00Z"
              class="date-value"
            >
              Due May 1, 2026
            </time>
          </div>
          <div class="date-item">
            <span class="date-label">Time remaining</span>
            <time
              data-testid="test-todo-time-remaining"
              id="todo-time-remaining"
              class="time-remaining"
              aria-live="polite"
              aria-atomic="true"
              >Calculating…</time
            >
          </div>
        </div>

        <hr class="divider" aria-hidden="true" />

        <ul
          data-testid="test-todo-tags"
          class="tags-list"
          role="list"
          aria-label="Tags"
        >
          <li data-testid="test-todo-tag-work" class="tag" role="listitem">
            work
          </li>
          <li data-testid="test-todo-tag-urgent" class="tag" role="listitem">
            urgent
          </li>
          <li class="tag" role="listitem">design</li>
        </ul>

        <hr class="divider" aria-hidden="true" />

        <footer class="card-footer">
          <button
            id="btn-edit"
            data-testid="test-todo-edit-button"
            class="btn btn-edit"
            aria-label="Edit task"
          >
            <svg
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="1.8"
              stroke-linecap="round"
              stroke-linejoin="round"
              aria-hidden="true"
            >
              <path
                d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"
              />
              <path
                d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"
              />
            </svg>
            Edit
          </button>
          <button
            id="btn-delete"
            data-testid="test-todo-delete-button"
            class="btn btn-delete"
            aria-label="Delete task"
          >
            <svg
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="1.8"
              stroke-linecap="round"
              stroke-linejoin="round"
              aria-hidden="true"
            >
              <polyline points="3 6 5 6 21 6" />
              <path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6" />
              <path d="M10 11v6" />
              <path d="M14 11v6" />
              <path d="M9 6V4h6v2" />
            </svg>
            Delete
          </button>
        </footer>
      </article>
    </main>

    <div
      id="edit-modal"
      class="modal-backdrop"
      role="dialog"
      aria-modal="true"
      aria-labelledby="modal-title"
      hidden
    >
      <div class="modal-box">
        <div class="modal-header">
          <h3 id="modal-title" class="modal-title">Edit task</h3>
          <button
            id="btn-modal-close"
            class="modal-close-btn"
            aria-label="Close edit form"
          >
            <svg
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="1.8"
              stroke-linecap="round"
              stroke-linejoin="round"
              aria-hidden="true"
            >
              <line x1="18" y1="6" x2="6" y2="18" />
              <line x1="6" y1="6" x2="18" y2="18" />
            </svg>
          </button>
        </div>

        <div class="modal-body">
          <div class="form-field">
            <label for="edit-title" class="form-label">Title</label>
            <input
              type="text"
              id="edit-title"
              class="form-input"
              aria-required="true"
            />
            <span id="edit-title-error" class="form-error" role="alert" hidden
              >Title cannot be empty.</span
            >
          </div>

          <div class="form-field">
            <label for="edit-description" class="form-label">Description</label>
            <textarea
              id="edit-description"
              class="form-textarea"
              rows="3"
            ></textarea>
          </div>

          <div class="form-row">
            <div class="form-field">
              <label for="edit-priority" class="form-label">Priority</label>
              <select id="edit-priority" class="form-select">
                <option value="high">High</option>
                <option value="medium">Medium</option>
                <option value="low">Low</option>
              </select>
            </div>
            <div class="form-field">
              <label for="edit-status" class="form-label">Status</label>
              <select id="edit-status" class="form-select">
                <option value="pending">Pending</option>
                <option value="inprogress">In Progress</option>
                <option value="done">Done</option>
              </select>
            </div>
          </div>

          <div class="form-field">
            <label for="edit-due-date" class="form-label">Due date</label>
            <input type="date" id="edit-due-date" class="form-input" />
          </div>
        </div>

        <div class="modal-footer">
          <button
            id="btn-modal-cancel"
            class="btn btn-cancel"
            aria-label="Cancel editing"
          >
            Cancel
          </button>
          <button
            id="btn-modal-save"
            class="btn btn-save"
            aria-label="Save changes"
          >
            Save changes
          </button>
        </div>
      </div>
    </div>

    <script src="todo.js"></script>
  </body>
</html>
